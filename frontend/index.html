<!doctype html>
<html lang="eu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESTIM | Bideojokoen Salmenta</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <header class="topbar">
      <div>
        <h1>ESTIM</h1>
        <p class="subtitle">Zure bideojokoen denda SPA + API formatuan</p>
      </div>
      <div id="user-info" class="user-info hidden">
        <span id="welcome-text"></span>
        <button id="logout-btn" class="btn btn-ghost">Saioa itxi</button>
      </div>
    </header>

    <main class="container">
      <section id="auth-section" class="panel">
        <h2>ESTIM-era sarrera</h2>
        <div class="grid-two">
          <form id="login-form" class="card">
            <h3>Saioa hasi</h3>
            <label>Erabiltzailea
              <input type="text" name="username" required />
            </label>
            <label>Pasahitza
              <input type="password" name="password" required />
            </label>
            <button class="btn" type="submit">Sartu</button>
          </form>

          <form id="register-form" class="card">
            <h3>Erregistroa (erabiltzaile estandarra)</h3>
            <label>Erabiltzailea
              <input type="text" name="username" required />
            </label>
            <label>Pasahitza (gutx. 6)
              <input type="password" name="password" minlength="6" required />
            </label>
            <button class="btn" type="submit">Kontua sortu</button>
          </form>
        </div>
      </section>

      <section id="app-section" class="hidden">
        <div class="tabs">
          <button class="tab-btn active" data-tab="catalogo">Katalogoa</button>
          <button class="tab-btn" data-tab="lista" id="my-list-tab">Nire zerrenda</button>
          <button class="tab-btn hidden" data-tab="admin" id="admin-tab">Admin panela</button>
        </div>

        <section id="catalogo" class="panel tab-content active">
          <h2>Bideojokoen katalogo orokorra</h2>
          <p class="hint">Erabiltzaile estandarrek jokoak euren zerrenda pertsonalean gorde ditzakete.</p>
          <div id="games-list" class="card-list"></div>
        </section>

        <section id="lista" class="panel tab-content">
          <h2>Nire zerrenda pertsonala</h2>
          <div id="favorites-list" class="card-list"></div>
        </section>

        <section id="admin" class="panel tab-content">
          <h2>Bideojokoen kudeaketa (CRUD)</h2>
          <form id="game-form" class="card form-inline">
            <input type="hidden" id="game-id" />
            <label>Izenburua
              <input id="title" required />
            </label>
            <label>Generoa
              <input id="genre" required />
            </label>
            <label>Plataforma
              <input id="platform" required />
            </label>
            <label>Prezioa
              <input id="price" type="number" min="0" step="0.01" required />
            </label>
            <label>Stock
              <input id="stock" type="number" min="0" step="1" required />
            </label>
            <label>Azalaren irudia (URL)
              <input id="cover-image" type="url" placeholder="https://..." />
            </label>
            <div class="row-buttons">
              <button class="btn" type="submit" id="save-game-btn">Gorde</button>
              <button class="btn btn-ghost" type="button" id="reset-form-btn">Garbitu</button>
            </div>
          </form>
          <div id="admin-games-list" class="card-list"></div>
        </section>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
  </body>
</html>
